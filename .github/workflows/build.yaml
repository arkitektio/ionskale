name: build

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - main

jobs:
  buf-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1
      - name: Buf Lint
        uses: bufbuild/buf-lint-action@v1
        with:
          input: proto

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Build
        run: |
          go test -v -short ./...
          go build cmd/ionscale/main.go

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - buf-check
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      DOCKER_CLI_EXPERIMENTAL: "enabled"
      ROLLING_TAG: v0.0.0-main
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Delete existing rolling release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = process.env.ROLLING_TAG;
            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });

              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
      - name: Update rolling tag
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -fa "$ROLLING_TAG" -m "rolling main release"
          git push origin "refs/tags/$ROLLING_TAG" --force
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: 'go.mod'
          cache: true
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}